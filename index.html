<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bombay Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#111;
color:white;
}

/* HEADER */
header{
background:rgba(0,0,0,0.9);
padding:15px 0;
position:fixed;
width:100%;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,215,0,0.2);
}

nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

.logo{
font-size:30px;
font-weight:bold;
color:gold;
}

.nav-links{
display:flex;
list-style:none;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
}

.nav-links a:hover{
color:gold;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1445205170230-053b83016050');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-content h1{
font-size:60px;
color:gold;
}

.hero-content p{
margin:20px 0;
font-size:20px;
}

.cta-button{
padding:15px 30px;
background:gold;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
display:inline-block;
}

/* PRODUCTS */
.products{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:40px;
color:gold;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.product-card{
background:#1c1c1c;
border-radius:20px;
overflow:hidden;
position:relative;
transition:.3s;
}

.product-card:hover{
transform:translateY(-10px);
}

.product-image{
height:300px;
overflow:hidden;
background:#000;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.product-info{
padding:20px;
}

.product-title{
font-size:22px;
}

.price-box{
display:flex;
gap:10px;
margin:10px 0;
align-items:center;
flex-wrap:wrap;
}

.new-price{
color:gold;
font-size:22px;
font-weight:bold;
}

.old-price{
text-decoration:line-through;
color:gray;
}

.sale-badge{
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.wishlist{
position:absolute;
top:10px;
right:10px;
background:white;
color:red;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.buy-btn{
width:100%;
padding:12px;
background:gold;
border:none;
font-weight:bold;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
justify-content:center;
align-items:center;
z-index:3000;
padding:15px;
}

.modal-content{
background:#fff;
color:#000;
width:100%;
max-width:420px;
border-radius:18px;
padding:20px;
position:relative;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}

.modal-content h2{
margin-bottom:15px;
}

.modal-content input,
.modal-content select,
.modal-content textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

.payment-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:10px;
font-size:15px;
}

.cod{
background:#111;
color:#fff;
}

.upi{
background:purple;
color:#fff;
}

.whatsapp-order{
background:#25D366;
color:#fff;
}

.small-note{
font-size:13px;
color:#555;
margin-top:10px;
line-height:1.4;
}

/* MOBILE */
@media(max-width:768px){
.nav-links{
display:none;
}

.hero-content h1{
font-size:35px;
}

.hero-content p{
font-size:16px;
}

.section-title{
font-size:32px;
}
}
</style>
</head>
<body>

<header>
<nav>
<div class="logo">Bombay Fashion</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#products">Shop</a></li>
</ul>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Bombay Fashion</h1>
<p>Luxury Clothing Collection 2026</p>
<a href="#products" class="cta-button">Shop Now</a>
</div>
</section>

<section class="products" id="products">
<h2 class="section-title">Featured Products</h2>
<div class="products-grid" id="productsGrid"></div>
</section>

<a href="https://wa.me/919321319778" class="whatsapp-btn" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<!-- CHECKOUT MODAL -->
<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2>Checkout</h2>

    <input type="text" id="custName" placeholder="Your Name" required>
    <input type="tel" id="custPhone" placeholder="Phone Number" required>
    <textarea id="custAddress" placeholder="Full Address" rows="3" required></textarea>

    <select id="size">
      <option value="S">Size S</option>
      <option value="M">Size M</option>
      <option value="L">Size L</option>
      <option value="XL">Size XL</option>
    </select>

    <input type="number" id="qty" value="1" min="1">

    <button class="payment-btn cod" onclick="cashOnDelivery()">Cash on Delivery</button>
    <button class="payment-btn upi" onclick="payUPI()">Pay via UPI</button>
    <button class="payment-btn whatsapp-order" onclick="orderWhatsApp()">Order on WhatsApp</button>

    <div class="small-note">
      COD and WhatsApp orders will open directly in your WhatsApp with full customer details.
    </div>
  </div>
</div>

<script>
const whatsappNumber = "919321319778";
const upiId = "mallikrehan78600@oksbi";

let selectedProduct = null;

const products = [
{
id:1,
name:"Brooklyn Sweatshirt",
price:1299,
oldPrice:1999,
image:"images/brooklyn.jpg",
rating:4.8
},
{
id:2,
name:"LA Oversized Sweatshirt",
price:1499,
oldPrice:2299,
image:"images/la-sweater.jpg",
rating:4.9
},
{
id:3,
name:"Premium Zip Polo",
price:1199,
oldPrice:1799,
image:"images/zip-shirt.jpg",
rating:4.7
},
{
id:4,
name:"Brown Leather Jacket",
price:2499,
oldPrice:3499,
image:"images/brown-jacket.jpg",
rating:5.0
}
];

function renderProducts(){
const grid = document.getElementById("productsGrid");

grid.innerHTML = products.map(product => `
<div class="product-card">

<div class="sale-badge">
${Math.round(((product.oldPrice - product.price) / product.oldPrice) * 100)}% OFF
</div>

<div class="wishlist">
<i class="fas fa-heart"></i>
</div>

<div class="product-image">
<img src="${product.image}" alt="${product.name}">
</div>

<div class="product-info">
<div class="product-title">${product.name}</div>

<div class="price-box">
<span class="new-price">₹${product.price}</span>
<span class="old-price">₹${product.oldPrice}</span>
</div>

<div>⭐ ${product.rating}</div>

<button class="buy-btn" onclick="openCheckout(${product.id})">
Buy Now
</button>

</div>
</div>
`).join('');
}

function openCheckout(id){
selectedProduct = products.find(p => p.id === id);
document.getElementById("checkoutModal").style.display = "flex";
}

function closeModal(){
document.getElementById("checkoutModal").style.display = "none";
}

function getOrderDetails(){
const name = document.getElementById("custName").value.trim();
const phone = document.getElementById("custPhone").value.trim();
const address = document.getElementById("custAddress").value.trim();
const size = document.getElementById("size").value;
const qty = parseInt(document.getElementById("qty").value) || 1;

if(!name || !phone || !address){
alert("Please fill name, phone and address");
return null;
}

return {
name,
phone,
address,
size,
qty,
total: selectedProduct.price * qty
};
}

function cashOnDelivery(){
const o = getOrderDetails();
if(!o) return;

let msg = `COD Order:
Product: ${selectedProduct.name}
Size: ${o.size}
Qty: ${o.qty}
Total: ₹${o.total}

Name: ${o.name}
Phone: ${o.phone}
Address: ${o.address}`;

window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`,'_blank');
closeModal();
}

function payUPI(){
const o = getOrderDetails();
if(!o) return;

const upiLink = `upi://pay?pa=${upiId}&pn=Bombay Fashion&am=${o.total}&cu=INR`;
window.location.href = upiLink;
}

function orderWhatsApp(){
const o = getOrderDetails();
if(!o) return;

let msg = `New Order:
Product: ${selectedProduct.name}
Size: ${o.size}
Qty: ${o.qty}
Total: ₹${o.total}

Name: ${o.name}
Phone: ${o.phone}
Address: ${o.address}`;

window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`,'_blank');
closeModal();
}

window.onclick = function(event){
const modal = document.getElementById("checkoutModal");
if(event.target === modal){
closeModal();
}
}

renderProducts();
</script>

</body>
</html>
