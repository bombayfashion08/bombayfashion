<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bombay Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#111;
color:white;
}

/* HEADER */
header{
background:rgba(0,0,0,0.9);
padding:15px 0;
position:fixed;
width:100%;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,215,0,0.2);
}

nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

.logo{
font-size:30px;
font-weight:bold;
color:gold;
}

.nav-links{
display:flex;
list-style:none;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
}

.nav-links a:hover{
color:gold;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1445205170230-053b83016050');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-content h1{
font-size:60px;
color:gold;
}

.hero-content p{
margin:20px 0;
font-size:20px;
}

.cta-button{
padding:15px 30px;
background:gold;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

/* PRODUCTS */
.products{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:40px;
color:gold;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.product-card{
background:#1c1c1c;
border-radius:20px;
overflow:hidden;
position:relative;
transition:.3s;
}

.product-card:hover{
transform:translateY(-10px);
}

.product-image{
height:300px;
overflow:hidden;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
}

.product-info{
padding:20px;
}

.product-title{
font-size:22px;
}

.price-box{
display:flex;
gap:10px;
margin:10px 0;
}

.new-price{
color:gold;
font-size:22px;
font-weight:bold;
}

.old-price{
text-decoration:line-through;
color:gray;
}

.sale-badge{
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.wishlist{
position:absolute;
top:10px;
right:10px;
background:white;
color:red;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.buy-btn{
width:100%;
padding:12px;
background:gold;
border:none;
font-weight:bold;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.nav-links{
display:none;
}

.hero-content h1{
font-size:35px;
}
}
</style>
</head>
<body>

<header>
<nav>
<div class="logo">Bombay Fashion</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#products">Shop</a></li>
</ul>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Bombay Fashion</h1>
<p>Luxury Clothing Collection 2026</p>
<a href="#products" class="cta-button">Shop Now</a>
</div>
</section>

<section class="products" id="products">
<h2 class="section-title">Featured Products</h2>
<div class="products-grid" id="productsGrid"></div>
</section>

<a href="https://wa.me/919321319778" class="whatsapp-btn">
<i class="fab fa-whatsapp"></i>
</a>

<script>
const whatsappNumber = "919321319778";
const upiId = "mallikrehan78600@oksbi";

const products=[
{
id:1,
name:"Brooklyn Sweatshirt",
price:1299,
oldPrice:1999,
image:"brooklyn.jpg",
rating:4.8
},
{
id:2,
name:"LA Oversized Sweatshirt",
price:1499,
oldPrice:2299,
image:"la-sweater.jpg",
rating:4.9
},
{
id:3,
name:"Premium Zip Polo",
price:1199,
oldPrice:1799,
image:"zip-polo.jpg",
rating:4.7
},
{
id:4,
name:"Brown Leather Jacket",
price:2499,
oldPrice:3499,
image:"brown-jacket.jpg",
rating:5.0
}
];

function renderProducts(){
const grid=document.getElementById("productsGrid");

grid.innerHTML=products.map(product=>`
<div class="product-card">

<div class="sale-badge">
${Math.round(((product.oldPrice-product.price)/product.oldPrice)*100)}% OFF
</div>

<div class="wishlist">
<i class="fas fa-heart"></i>
</div>

<div class="product-image">
<img src="${product.image}" alt="${product.name}">
</div>

<div class="product-info">
<div class="product-title">${product.name}</div>

<div class="price-box">
<span class="new-price">₹${product.price}</span>
<span class="old-price">₹${product.oldPrice}</span>
</div>

<div>⭐ ${product.rating}</div>

<button class="buy-btn" onclick="orderWhatsApp('${product.name}','${product.price}')">
Order Now
</button>

</div>
</div>
`).join('');
}

function orderWhatsApp(name,price){

let paymentOption = prompt(
`Choose Payment Method:
1 = UPI
2 = Google Pay
3 = Paytm
4 = PhonePe`
);

let size = prompt("Choose Size: S, M, L, XL");

if(size && paymentOption){

let paymentMethod = "";

if(paymentOption=="1") paymentMethod="UPI";
if(paymentOption=="2") paymentMethod="Google Pay";
if(paymentOption=="3") paymentMethod="Paytm";
if(paymentOption=="4") paymentMethod="PhonePe";

let amount = price;

if(paymentOption=="1"){
window.location.href=`upi://pay?pa=${upiId}&pn=BombayFashion&am=${amount}&cu=INR`;
}

if(paymentOption=="2"){
window.location.href=`tez://upi/pay?pa=${upiId}&pn=BombayFashion&am=${amount}&cu=INR`;
}

if(paymentOption=="3"){
window.location.href=`paytmmp://pay?pa=${upiId}&pn=BombayFashion&am=${amount}&cu=INR`;
}

if(paymentOption=="4"){
window.location.href=`phonepe://pay?pa=${upiId}&pn=BombayFashion&am=${amount}&cu=INR`;
}

let msg=`Hi, I want to order:
Product: ${name}
Size: ${size.toUpperCase()}
Price: ₹${price}
Payment Method: ${paymentMethod}`;

let url=`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;

setTimeout(()=>{
window.open(url,'_blank');
},1000);

}
}

renderProducts();
</script>

</body>
</html>
